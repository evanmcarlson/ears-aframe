<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>8th Wall: Ears Aframe</title>
  <meta name="description" content="Self-hosted 8th Wall face tracking example (ears-aframe).">
  <meta property="og:title" content="8th Wall: Ears Aframe">
  <meta property="og:description" content="Self-hosted 8th Wall face tracking example (ears-aframe).">

  <!-- 8th Wall engine (self-hosted). 8frame is 8th Wall's A-Frame fork. -->
  <script crossorigin="anonymous" src="./external/scripts/8frame-1.5.0.min.js"></script>
  <script>
    // Compatibility shim for aframe-physics-system 4.0.1: it uses three.js APIs that were
    // removed in the newer three bundled with 8frame (Matrix4.getInverse, Quaternion.inverse).
    // Restore them with their original in-place semantics.
    if (!THREE.Matrix4.prototype.getInverse) {
      THREE.Matrix4.prototype.getInverse = function (m) { return this.copy(m).invert() }
    }
    if (!THREE.Quaternion.prototype.inverse) {
      THREE.Quaternion.prototype.inverse = function () { return this.invert() }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js" crossorigin="anonymous"></script>

  <script src="//cdn.8thwall.com/web/aframe/ammo.wasm.js"></script>
  <script src="//cdn.8thwall.com/web/aframe/aframe-physics-system-4.0.1.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" crossorigin="anonymous" async="true" data-preload-chunks="face"></script>
</head>

<body>
<script src="bundle.js"></script>

<a-scene
  physics="driver: ammo; debug:false;"
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement:true"
  ui-manager
  xrconfig="allowedDevices: any; cameraDirection: front; mirroredDisplay: true"
  xrface="enableEars:true; meshGeometry: face, eyes, iris, mouth">
  <a-assets>
    <a-asset-item id="head-occluder-no-ears" src="./assets/models/noEarsHeadOccluder.glb"></a-asset-item>

    <a-asset-item id="earringLow" src="./assets/models/danglyBottom.glb"></a-asset-item>
    <a-asset-item id="earringMid" src="./assets/models/danglyMiddle.glb"></a-asset-item>
    <a-asset-item id="earringTop" src="./assets/models/danglyTop.glb"></a-asset-item>

    <a-asset-item id="stud" src="./assets/models/8stud.glb"></a-asset-item>

    <a-asset-item id="arrowIn" src="./assets/models/arrowIn.glb"></a-asset-item>
    <a-asset-item id="arrowOut" src="./assets/models/arrowOut.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 2 0"></a-camera>

  <xrextras-faceanchor>
    <a-entity
      gltf-model="#head-occluder-no-ears"
      position="0 0.08 0.13"
      scale="1 1.1 1.2"
      xrextras-hider-material></a-entity>

    <a-entity
      scale="1.05 1.1 1.35"
      rotation="-6 0 0"
      position="0 0 -0.15"
      ammo-body="type: static"
      ammo-shape="type: capsule; fit: manual; halfExtents: .036 .02 .036 ">
    </a-entity>

    <xrextras-face-mesh xrextras-hider-material></xrextras-face-mesh>

    <xrextras-face-attachment point="leftHelix">
      <a-entity
        id="leftStud"
        position="-.04 0 0"
        visible="false"
        reflections="type:static"
        rotation="10 160 -25"
        gltf-model="#stud"
        scale=".1 .1 .1"></a-entity>
    </xrextras-face-attachment>

    <xrextras-face-attachment point="leftCanal">
      <a-sphere
        id="leftEarOccluder"
        position="0 0.01 .1"
        rotation="0 -50 -17"
        color="red"
        scale="0.12 .23 0.03"
        xrextras-hider-material></a-sphere>

      <a-sphere
        scale=".05 .1 .04"
        id="leftTragusOccluder"
        color="red"
        xrextras-hider-material
        position="-.04 0.02 0"></a-sphere>

      <a-entity
        id="arrowInEntity"
        position="0 .01 .01"
        visible="false"
        rotation="0 180 0"
        gltf-model="#arrowIn"
        scale="1 1 1"></a-entity>
    </xrextras-face-attachment>

    <xrextras-face-attachment point="leftLobe">
      <a-entity
        id="leftEarringTop"
        earring-chain
        position="0 -.04 0"
        reflections="type:static"
        rotation="0 -45 0"
        gltf-model="#earringTop"
        scale=".15 .15 .15"></a-entity>
    </xrextras-face-attachment>

    <xrextras-face-attachment point="rightHelix">
      <a-entity
        id="rightStud"
        position=".04 0 0"
        visible="false"
        reflections="type:static"
        rotation="10 -160 25"
        gltf-model="#stud"
        scale=".1 .1 .1"></a-entity>
    </xrextras-face-attachment>

    <xrextras-face-attachment point="rightCanal">
      <a-sphere
        id="rightEarOccluder"
        position="0 0.02 0.13"
        rotation="0 40 17"
        color="red"
        scale="0.12 .23 0.03"
        xrextras-hider-material></a-sphere>

      <a-sphere
        scale=".05 .1 .02"
        id="rightTragusOccluder"
        rotation="20 0 0"
        color="red"
        xrextras-hider-material
        position=".05 0.02 -.03"></a-sphere>

      <a-entity
        id="arrowOutEntity"
        position=".1 .03 .08"
        visible="false"
        rotation="0 180 0"
        gltf-model="#arrowOut"
        scale="1 1 1"></a-entity>
    </xrextras-face-attachment>

    <xrextras-face-attachment point="rightLobe">
      <a-entity
        id="rightEarringTop"
        earring-chain
        position="0 -.04 0"
        reflections="type:static"
        rotation="0 45 0"
        gltf-model="#earringTop"
        scale=".15 .15 .15"></a-entity>
    </xrextras-face-attachment>
  </xrextras-faceanchor>

  <a-entity
    hide-earrings
    id="leftEarringMid"
    reflections="type:static"
    gltf-model="#earringMid"
    scale=".015 .015 .015"></a-entity>
  <a-entity
    id="leftEarringLow"
    reflections="type:static"
    gltf-model="#earringLow"
    scale=".015 .015 .015"></a-entity>

  <a-entity
    id="rightEarringMid"
    reflections="type:static"
    gltf-model="#earringMid"
    scale=".015 .015 .015"></a-entity>
  <a-entity
    id="rightEarringLow"
    reflections="type:static"
    gltf-model="#earringLow"
    scale=".015 .015 .015"></a-entity>

  <a-light type="directional" target="#face" position="0 1.8 3" intensity="0.8"></a-light>
  <a-light type="ambient" intensity="0.8"></a-light>
</a-scene>

<div id="nextButton">Next</div>

</body>

</html>
